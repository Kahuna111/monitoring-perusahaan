<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koneksi Terputus | MonitorPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f1117;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glow Background */
        .glow-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: pulse 8s ease-in-out infinite alternate;
        }
        .orb-1 {
            background: #6366f1;
            top: -100px;
            left: -100px;
        }
        .orb-2 {
            background: #8b5cf6;
            bottom: -150px;
            right: -100px;
            animation-delay: -3s;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.15) translate(20px, 20px); }
        }

        /* Glassmorphism Card */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px 36px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
            margin: 20px;
        }

        .icon-wrap {
            width: 80px;
            height: 80px;
            background: rgba(239, 68, 68, 0.1);
            border: 1.5px solid rgba(239, 68, 68, 0.25);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            color: #ef4444;
            animation: float 4s ease-in-out infinite;
        }
        .icon-wrap svg {
            width: 38px;
            height: 38px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        p {
            font-size: 13.5px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #ffffff;
            border: none;
            border-radius: 11px;
            font-size: 14.5px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover {
            background: linear-gradient(135deg, #4f46e5, #4338ca);
            box-shadow: 0 6px 28px rgba(99, 102, 241, 0.5);
            transform: translateY(-1px);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn svg {
            width: 16px;
            height: 16px;
        }

        .config-text {
            margin-top: 24px;
            font-size: 11.5px;
            color: #475569;
        }
        .config-text code {
            font-family: monospace;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="glow-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<div class="card">
    <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
    </div>

    <h1>Sambungan Terputus</h1>
    <p>Aplikasi gagal terhubung ke server. Pastikan server lokal Anda aktif atau periksa koneksi internet Anda.</p>

    <button class="btn" id="retryBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 11-.57-8.38l5.67-5.67"/>
        </svg>
        Coba Hubungkan Kembali
    </button>

    <div class="config-text">
        URL Server Saat Ini: <code id="currentUrl">http://localhost:8000</code>
    </div>
</div>

<script>
    // Read the target URL from the query string
    const params = new URLSearchParams(window.location.search);
    const targetUrl = params.get('url') || 'http://localhost:8000';

    document.getElementById('currentUrl').textContent = targetUrl;

    const retryBtn = document.getElementById('retryBtn');
    retryBtn.addEventListener('click', () => {
        // Change text state to loading
        retryBtn.disabled = true;
        retryBtn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation: spin 1s linear infinite;">
                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 11-.57-8.38l5.67-5.67"/>
            </svg>
            Menghubungkan...
        `;
        
        // Navigate back to the target URL
        setTimeout(() => {
            window.location.href = targetUrl;
        }, 800);
    });
</script>
<style>
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
</style>
</body>
</html>
